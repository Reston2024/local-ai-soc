# SpiderFoot OSINT Platform — Phase 51
# Built from cloned source at C:\Users\Admin\spiderfoot-src\
# Run: docker compose -f C:\Users\Admin\AI-SOC-Brain\infra\docker-compose.spiderfoot.yml up -d
# Stop: docker compose -f C:\Users\Admin\AI-SOC-Brain\infra\docker-compose.spiderfoot.yml down
# Logs: docker compose -f C:\Users\Admin\AI-SOC-Brain\infra\docker-compose.spiderfoot.yml logs -f
#
# First run builds image (~2 min). Subsequent starts are instant.
# Web UI (optional): http://localhost:5001
# FastAPI connects: http://localhost:5001

services:
  spiderfoot:
    build:
      context: C:\Users\Admin\spiderfoot-src
      dockerfile: Dockerfile
    image: spiderfoot:local
    container_name: ai-soc-spiderfoot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/var/lib/spiderfoot
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  spiderfoot_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\Users\Admin\spiderfoot-data

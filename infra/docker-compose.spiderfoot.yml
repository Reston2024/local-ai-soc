# SpiderFoot OSINT Platform — Phase 51
# Run: docker compose -f infra/docker-compose.spiderfoot.yml up -d
# Stop: docker compose -f infra/docker-compose.spiderfoot.yml down
# Logs: docker compose -f infra/docker-compose.spiderfoot.yml logs -f
#
# Data persisted at: C:/Users/Admin/spiderfoot-data/
# Web UI (optional): http://localhost:5001
# FastAPI connects: http://localhost:5001 (native process, no host.docker.internal needed)

services:
  spiderfoot:
    image: smicallef/spiderfoot:latest
    container_name: ai-soc-spiderfoot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/var/lib/spiderfoot
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  spiderfoot_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:/Users/Admin/spiderfoot-data

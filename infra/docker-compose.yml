#      - ./suricata/rules:/etc/suricata/rules:ro
#      - suricata_logs:/var/log/suricata
#    command: ["-c", "/etc/suricata/suricata.yaml", "--af-packet"]
#    restart: unless-stopped
#    # suricata_logs volume must be shared with vector service to tail eve.json:

# BLOCKER: Suricata requires Linux kernel features (AF_PACKET / NFQUEUE) for
# live packet capture. This file is a placeholder for future Linux deployment.
# Windows Docker Desktop cannot provide network_mode: host — Suricata cannot
# capture packets in a Docker Desktop environment on Windows.
#
# To activate on Linux:
#   1. Install suricata: apt install suricata
#   2. Run suricata-update to download community rules
#   3. Replace this file with a real suricata.yaml config
#   4. Uncomment the suricata service in infra/docker-compose.yml
#   5. Uncomment suricata_eve source in infra/vector/vector.yaml

# AI SOC Brain — Vector Pipeline (Phase 2)
#
# Sources:
#   fixture_ndjson    — reads NDJSON fixture files (kept from Wave 1)
#   syslog_udp        — listens on UDP 514 for RFC3164/RFC5424/CEF
#   syslog_tcp        — listens on TCP 6514 (IANA syslog-tls port; avoids root)
#   # firewall_logs   — SCAFFOLD: file-based firewall log input (see comment below)
#
# Transforms:
#   normalise_fixture — extract fields from NDJSON fixture lines
#   normalise_syslog  — add source label; raw line forwarded to backend parser
#   # firewall_parse  — SCAFFOLD: vendor-specific firewall log parsing
#
# Sinks:
#   backend_fixture   — POST /ingest to backend API (fixture events)
#   backend_syslog    — POST /ingest/syslog to backend (raw syslog line)
#   opensearch_events — direct OpenSearch indexing (soc-events index, Phase 3)

# ============================================================
# SOURCES
# ============================================================

sources:
  fixture_ndjson:
    type: file
    include:
      - /fixtures/*.ndjson
    read_from: beginning
    data_dir: /tmp/vector-data

  syslog_udp:
    type: socket
    mode: udp
    address: "0.0.0.0:514"
    # Accepts RFC3164, RFC5424, CEF — raw line forwarded to /ingest/syslog
    # for parsing by backend.src.ingestion.syslog_parser

  syslog_tcp:
    type: socket
    mode: tcp
    address: "0.0.0.0:6514"
    # TCP syslog on 6514 (IANA syslog-tls; avoids root requirement for 514)

  # ---- SCAFFOLD: Firewall log file input ---------------------------------
  # Uncomment and set include path when integrating a vendor firewall.
  # Tested formats: Palo Alto CSV, Cisco ASA, Fortinet UTM.
  #
  # firewall_logs:
  #   type: file
  #   include:
  #     - /firewall-logs/*.log
  #   read_from: beginning
  #   data_dir: /tmp/vector-fw-data
  # ------------------------------------------------------------------------

  # ---- SCAFFOLD: Suricata EVE JSON source (Phase 5) ----------------------
  # BLOCKER: Suricata requires Linux NFQUEUE kernel module — unavailable on
  # Windows (no native packet capture support). This scaffold is for future
  # Linux/WSL2 deployment. Uncomment when running on a Linux host or in a
  # WSL2 environment with network namespace access.
  #
  # suricata_eve:
  #   type: file
  #   include:
  #     - /var/log/suricata/eve.json
  #   read_from: beginning
  #   data_dir: /tmp/vector-suricata-data
  #   # Vector tails eve.json in real time; Suricata rotates it daily by default.
  #   # Each line is a complete EVE JSON record — no multiline parsing needed.
  # ------------------------------------------------------------------------

# ============================================================
# TRANSFORMS
# ============================================================

transforms:
  normalise_fixture:
    type: remap
    inputs:
      - fixture_ndjson
    source: |
      # Parse NDJSON fixture line and add source label
      parsed, err = parse_json(.message)
      if err == null {
        .timestamp  = parsed.timestamp
        .host       = parsed.host
        .src_ip     = parsed.src_ip
        .dst_ip     = parsed.dst_ip
        .event_type = parsed.event
        .query      = parsed.query
        .port       = parsed.port
        .severity   = parsed.severity
        .source     = "fixture"
        del(.message)
      }

  normalise_syslog:
    type: remap
    inputs:
      - syslog_udp
      - syslog_tcp
    source: |
      # Preserve raw syslog line; add source label.
      # Backend /ingest/syslog does the heavy parsing (RFC3164/5424/CEF).
      .source = "syslog"

  # ---- SCAFFOLD: Firewall log transform ----------------------------------
  # firewall_parse:
  #   type: remap
  #   inputs:
  #     - firewall_logs
  #   source: |
  #     .source = "firewall"
  #     # Add vendor-specific field extraction here
  # ------------------------------------------------------------------------

  # ---- SCAFFOLD: Suricata EVE normalise transform (Phase 5) --------------
  # BLOCKER: Depends on suricata_eve source above — same Linux NFQUEUE constraint.
  # Uncomment together with suricata_eve source when on Linux.
  #
  # normalise_suricata:
  #   type: remap
  #   inputs:
  #     - suricata_eve
  #   source: |
  #     # Add source label; backend /ingest parses the EVE JSON via suricata_parser.
  #     # The full parse_eve_line() logic lives in backend.src.parsers.suricata_parser
  #     # to keep field normalization centralized.
  #     .source = "suricata"
  # ------------------------------------------------------------------------

# ============================================================
# SINKS
# ============================================================

sinks:
  # --- Fixture NDJSON → backend /ingest (batch) ---------------------------
  backend_fixture:
    type: http
    inputs:
      - normalise_fixture
    uri: "http://backend:8000/ingest"
    method: post
    encoding:
      codec: json
    batch:
      max_events: 50
      timeout_secs: 5
    request:
      headers:
        Content-Type: application/json

  # --- Syslog → backend /ingest/syslog (raw line, plain text) -------------
  backend_syslog:
    type: http
    inputs:
      - normalise_syslog
    uri: "http://backend:8000/ingest/syslog"
    method: post
    encoding:
      codec: text
    request:
      headers:
        Content-Type: text/plain

  # --- Phase 3: OpenSearch direct indexing ---------------------------------
  # Both Vector pipeline events (fixture + syslog) and backend-ingested events
  # are indexed to the same 'soc-events' index. Fixed index name (no date suffix)
  # ensures GET /search covers all events regardless of ingestion time.
  opensearch_events:
    type: elasticsearch
    inputs:
      - normalise_fixture
      - normalise_syslog
    endpoint: "${OPENSEARCH_URL:-http://opensearch:9200}"
    index: "soc-events"
    mode: bulk
  # -------------------------------------------------------------------------

  # ---- SCAFFOLD: Suricata EVE backend sink (Phase 5) ---------------------
  # BLOCKER: Depends on normalise_suricata transform above — same Linux NFQUEUE
  # constraint. Uncomment on Linux when suricata_eve source + transform are active.
  #
  # backend_suricata:
  #   type: http
  #   inputs:
  #     - normalise_suricata
  #   uri: "http://backend:8000/ingest"
  #   method: post
  #   encoding:
  #     codec: json
  #   batch:
  #     max_events: 50
  #     timeout_secs: 5
  #   request:
  #     headers:
  #       Content-Type: application/json
  #   # The /ingest endpoint accepts source=suricata; backend.src.parsers.suricata_parser
  #   # handles the EVE JSON normalization into NormalizedEvent shape.
  # -------------------------------------------------------------------------

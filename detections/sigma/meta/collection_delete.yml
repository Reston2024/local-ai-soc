title: ChromaDB Collection Delete or Reset
id: 249cac6d-fcdf-4238-af19-fa8e83a064ae
status: experimental
description: Detects deletion or reset of a ChromaDB collection, which would destroy the SOC Brain's RAG knowledge base.
author: AI-SOC-Brain meta-detection
date: 2026-04-05
logsource:
    category: application
    product: ai-soc-brain
detection:
    selection:
        event_type: chroma_operation
        operation:
            - delete_collection
            - reset_collection
    condition: selection
falsepositives:
    - Authorized maintenance operations
level: critical
tags:
    - attack.defense-evasion
    - attack.t1485

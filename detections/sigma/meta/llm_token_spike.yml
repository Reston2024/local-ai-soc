title: LLM Token Spike
id: b87c789a-a918-48c5-8b83-ed2f44890f5e
status: experimental
description: Detects an abnormal spike in LLM prompt token count that may indicate prompt injection or context stuffing.
author: AI-SOC-Brain meta-detection
date: 2026-04-05
logsource:
    category: application
    product: ai-soc-brain
detection:
    selection:
        event_type: llm_call
        prompt_tokens|gte: 5000
    condition: selection
falsepositives:
    - Large evidence batches for complex investigations
level: medium
tags:
    - attack.execution
    - attack.t1059

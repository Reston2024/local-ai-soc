title: Auth Failure Burst
id: dc3426ff-96b4-4c83-96cd-f5ef6f8be8fb
status: experimental
description: Detects a burst of authentication failures that may indicate a brute-force attack against the SOC Brain API.
author: AI-SOC-Brain meta-detection
date: 2026-04-05
logsource:
    category: application
    product: ai-soc-brain
detection:
    selection:
        http_status_code: 401
    condition: selection | count() > 10
    timeframe: 60s
falsepositives:
    - Misconfigured clients with stale tokens
level: high
tags:
    - attack.credential-access
    - attack.t1110

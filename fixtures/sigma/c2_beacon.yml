title: C2 Beaconing Suspicious External Connection
id: 7b8c9d0e-1f2a-3b4c-5d6e-7f8901234abc
status: test
description: Detects suspicious process making repeated external connections on high ports
author: AI-SOC-Brain Phase 8
date: 2026/03/17
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        event_type: 'network_connection'
        dst_ip|contains: '185.220.'
    condition: selection
falsepositives:
    - Legitimate CDN traffic
level: critical
tags:
    - attack.command_and_control
    - attack.t1071.001
fields:
    - hostname
    - process_name
    - dst_ip
    - dst_port
    - domain

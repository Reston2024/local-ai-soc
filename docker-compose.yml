# AI-SOC-Brain — Docker Compose
# Only Caddy runs in Docker. All other services run natively on Windows.
# Ollama: native Windows (direct CUDA access to RTX 5080)
# FastAPI: native Python via uvicorn
# DuckDB/SQLite/Chroma: embedded in FastAPI process

services:
  caddy:
    # TODO: replace <digest> with output of: docker inspect caddy:2.9-alpine --format '{{index .RepoDigests 0}}'
    image: caddy:2.9-alpine  # UNPINNED — pin to digest when Docker is available
    container_name: ai-soc-brain-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./dashboard/dist:/srv/dashboard:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CADDY_ADMIN=127.0.0.1:2019
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
    name: ai-soc-brain-caddy-data
  caddy_config:
    name: ai-soc-brain-caddy-config

{
  "options": {
    "host_identifier": "hostname",
    "schedule_splay_percent": 10,
    "logger_plugin": "filesystem",
    "logger_path": "C:\\Program Files\\osquery\\log",
    "utc": true
  },
  "schedule": {
    "process_events": {
      "query": "SELECT pid, name, path, cmdline, parent, uid FROM processes;",
      "interval": 30,
      "snapshot": true,
      "description": "Running processes — 30s snapshot for process ancestry analysis"
    },
    "network_events": {
      "query": "SELECT pid, family, protocol, local_address, local_port, remote_address, remote_port, state FROM process_open_sockets WHERE state = 'ESTABLISHED' OR state = 'LISTEN';",
      "interval": 60,
      "snapshot": true,
      "description": "Open sockets — 60s snapshot for network connection analysis"
    },
    "user_events": {
      "query": "SELECT user, host, time, pid FROM logged_in_users;",
      "interval": 60,
      "snapshot": true,
      "description": "Logged-in users — 60s snapshot for lateral movement detection"
    },
    "file_events": {
      "query": "SELECT path, filename, size, atime, mtime, ctime, uid, gid FROM file WHERE directory = 'C:\\Windows\\System32' AND (filename LIKE '%.exe' OR filename LIKE '%.dll') LIMIT 100;",
      "interval": 120,
      "snapshot": true,
      "description": "System32 executables/DLLs — 120s snapshot for DLL hijacking detection"
    }
  }
}

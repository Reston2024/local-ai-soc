title: Suspicious DNS Query
id: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a
status: test
description: >
  Detects DNS queries to known suspicious domains. Matches NormalizedEvent.query
  field against a list of known-bad domain patterns used in test fixtures.
author: AI-SOC-Brain
date: 2026-03-15
tags:
    - attack.command_and_control
    - attack.t1071.004
logsource:
    product: network
    category: dns
detection:
    selection:
        query|contains:
            - suspicious-domain.test
            - malware.example
            - c2.evil.test
    condition: selection
level: high
falsepositives:
    - Internal test environments using these domain names

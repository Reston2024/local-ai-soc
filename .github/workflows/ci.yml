name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check .

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies including dev group (pytest, pytest-cov, ruff)
        run: uv sync --group dev
      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ tests/security/ \
            --cov=backend \
            --cov=ingestion \
            --cov=detections \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=junit.xml \
            -q
      - name: Security coverage gate (≥80% on security-critical modules)
        run: |
          uv run pytest tests/security/ tests/unit/ \
            --cov=backend.core.auth \
            --cov=ingestion.normalizer \
            --cov=backend.api.ingest \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml

  frontend:
    name: Frontend (build + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Type-check (svelte-check)
        run: npm run check

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Install pip-audit
        run: uv run pip install pip-audit
      - name: Run pip-audit
        # CVE-2026-4539: pygments AdlLexer ReDoS — no fix released yet as of 2026-03-27
        run: uv run pip-audit --desc --ignore-vuln CVE-2026-4539

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  doc-drift-gate:
    name: Documentation Drift Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (YAML parser)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Extract canonical phase from governance/release_state.yaml
        id: canonical
        run: |
          PHASE=$(yq '.release.latest_completed_phase' governance/release_state.yaml)
          echo "phase=${PHASE}" >> "$GITHUB_OUTPUT"
          echo "Canonical latest phase: ${PHASE}"

      - name: Check README.md mentions canonical phase
        run: |
          PHASE="${{ steps.canonical.outputs.phase }}"
          # README must mention "Phase ${PHASE}" somewhere in the status line
          if ! grep -q "Phase ${PHASE}" README.md; then
            echo "ERROR: README.md does not mention Phase ${PHASE}"
            echo "Canonical phase in governance/release_state.yaml: ${PHASE}"
            echo "Update the Status line in README.md to reference Phase ${PHASE}."
            exit 1
          fi
          echo "OK: README.md references Phase ${PHASE}"

      - name: Check STATE.md mentions canonical phase
        run: |
          PHASE="${{ steps.canonical.outputs.phase }}"
          if ! grep -q "Phase ${PHASE}" STATE.md; then
            echo "ERROR: STATE.md does not mention Phase ${PHASE}"
            echo "Canonical phase in governance/release_state.yaml: ${PHASE}"
            echo "Update STATE.md to reference Phase ${PHASE}."
            exit 1
          fi
          echo "OK: STATE.md references Phase ${PHASE}"

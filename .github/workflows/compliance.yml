name: Regulated Compliance Gate

# Runs on every push/PR to main — fail-closed.
# Complements ci.yml (lint, test, audit, secret-scan).
# Maps to NIST SP 800-53 Rev 5.2.0: CM-2, CM-6, SI-4, CA-2, CA-7, SA-24.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── CM-6 / CA-2: Coverage must never drop below 70% ────────────────────────
  coverage-gate:
    name: Coverage Gate (≥70% fail-closed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with strict coverage gate
        run: |
          uv run pytest tests/unit/ tests/security/ \
            --cov=backend \
            --cov=ingestion \
            --cov=detections \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=junit.xml \
            -q
        # Fail-closed: job fails (blocks merge) if coverage drops below 70%

      - name: Security-critical modules gate (≥80%)
        run: |
          uv run pytest tests/security/ tests/unit/ \
            --cov=backend.core.auth \
            --cov=ingestion.normalizer \
            --cov=backend.api.ingest \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage artifact (evidence)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-evidence-${{ github.sha }}
          path: |
            junit.xml
            coverage.xml
          retention-days: 90
        # 90-day retention supports RMF continuous monitoring window

  # ── CM-2 / SI-2: Dependency integrity check ────────────────────────────────
  dependency-integrity:
    name: Dependency Integrity (pip-audit + lock check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Verify uv.lock is up-to-date (CM-2)
        run: |
          uv sync --group dev
          # uv sync fails if lockfile is stale — enforces pinned baseline
          echo "uv.lock is consistent with pyproject.toml"

      - name: Run pip-audit (SI-2 flaw remediation)
        run: |
          uv run pip install pip-audit
          # CVE-2026-4539: pygments AdlLexer ReDoS — no fix released yet
          uv run pip-audit --desc --ignore-vuln CVE-2026-4539
        continue-on-error: false

      - name: Export dependency snapshot (evidence artifact)
        run: uv export --no-hashes > requirements-snapshot.txt

      - name: Upload dependency evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-evidence-${{ github.sha }}
          path: requirements-snapshot.txt
          retention-days: 90

  # ── AU-2 / SI-4: Sigma rule smoke test (detection integrity) ───────────────
  sigma-integrity:
    name: Sigma Rule Integrity (SI-4 detection assurance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Sigma parse smoke test
        run: |
          uv run pytest tests/sigma_smoke/ -q --tb=short
        # Fails if any Sigma YAML fails to parse — blocks merge on broken rules

  # ── CA-7 / SA-24: Compliance summary report ────────────────────────────────
  compliance-report:
    name: Compliance Summary (CA-7 continuous monitoring)
    runs-on: ubuntu-latest
    needs: [coverage-gate, dependency-integrity, sigma-integrity]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate compliance summary
        run: |
          echo "## Compliance Gate Summary" > compliance-summary.md
          echo "" >> compliance-summary.md
          echo "**Commit:** ${{ github.sha }}" >> compliance-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> compliance-summary.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> compliance-summary.md
          echo "" >> compliance-summary.md
          echo "| Control | Job | Status |" >> compliance-summary.md
          echo "|---------|-----|--------|" >> compliance-summary.md
          echo "| CM-2/CM-6 (Baseline Config) | dependency-integrity | ${{ needs.dependency-integrity.result }} |" >> compliance-summary.md
          echo "| CA-2/CA-7 (Coverage Gate) | coverage-gate | ${{ needs.coverage-gate.result }} |" >> compliance-summary.md
          echo "| SI-4 (Sigma Integrity) | sigma-integrity | ${{ needs.sigma-integrity.result }} |" >> compliance-summary.md
          echo "" >> compliance-summary.md
          echo "All jobs must pass (success) for merge to main." >> compliance-summary.md
          cat compliance-summary.md

      - name: Fail if any gate failed
        if: |
          needs.coverage-gate.result != 'success' ||
          needs.dependency-integrity.result != 'success' ||
          needs.sigma-integrity.result != 'success'
        run: |
          echo "One or more compliance gates failed. Merge blocked."
          exit 1

      - name: Upload compliance summary artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-summary-${{ github.sha }}
          path: compliance-summary.md
          retention-days: 90
